# ABOUTME: Nginx reverse proxy configuration for Chronicon
# ABOUTME: Routes API requests to backend, serves static archives

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml application/xml+rss
               text/javascript application/x-javascript;

    # Upstream API server
    upstream api {
        server api:8000;
        keepalive 32;
    }

    # HTTP server (localhost default)
    server {
        listen 80;
        server_name localhost;

        # For production, change server_name and add SSL:
        # server_name your-domain.com;
        #
        # # Redirect HTTP to HTTPS
        # location / {
        #     return 301 https://$server_name$request_uri;
        # }
        #
        # # LetsEncrypt challenge
        # location /.well-known/acme-challenge/ {
        #     root /var/www/certbot;
        # }

        # API proxy
        location /api/ {
            proxy_pass http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # OpenAPI spec (for MCP via OpenAPI)
        location /openapi.json {
            proxy_pass http://api/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # Cache OpenAPI spec for 5 minutes
            proxy_cache_valid 200 5m;
        }

        # API documentation (Swagger UI)
        location /docs {
            proxy_pass http://api/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /redoc {
            proxy_pass http://api/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Server-rendered search page (FTS mode)
        location /search {
            proxy_pass http://api/search;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Static archives (HTML export)
        location /archive/ {
            alias /archives/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            try_files $uri $uri/ $uri/index.html =404;

            # Cache static content
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Static assets
        location /assets/ {
            alias /archives/assets/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Root redirect to archive
        location = / {
            return 302 /archive/;
        }

        # Favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # Robots.txt
        location = /robots.txt {
            log_not_found off;
            access_log off;
        }
    }

    # HTTPS server (uncomment and configure for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL certificates (LetsEncrypt)
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #
    #     # SSL configuration
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #
    #     # Modern SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # ... (same location blocks as HTTP server above)
    # }
}
