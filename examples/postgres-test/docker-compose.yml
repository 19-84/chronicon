# ABOUTME: PostgreSQL production test stack for Chronicon
# ABOUTME: Tests full workflow with PostgreSQL backend, API, watch daemon, and nginx

# PostgreSQL production test stack
# Modified ports to avoid conflicts: 15432, 8888, 18080

services:
  postgres:
    image: postgres:17-alpine
    container_name: chronicon-pg-test
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: chronicon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chronicon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronicon -d chronicon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "15432:5432"
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile.api
    container_name: chronicon-api-test
    environment:
      DATABASE_URL: postgresql://chronicon:${POSTGRES_PASSWORD}@postgres:5432/chronicon
    volumes:
      - ./archives:/archives
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal
      - external
    restart: unless-stopped

  watch:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile.api
    container_name: chronicon-watch-test
    environment:
      DATABASE_URL: postgresql://chronicon:${POSTGRES_PASSWORD}@postgres:5432/chronicon
      CHRONICON_OUTPUT_DIR: /archives
      EXPORT_FORMATS: ${EXPORT_FORMATS:-html}
      GIT_PUSH_ENABLED: ${GIT_PUSH_ENABLED:-false}
    volumes:
      - ./archives:/archives
      - ./config/.chronicon.toml:/home/chronicon/.chronicon.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["watch", "--output-dir", "/archives"]
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - external
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: chronicon-nginx-test
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./archives:/archives:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - external
    restart: unless-stopped

networks:
  internal:
    internal: true
  external:
