# ABOUTME: PostgreSQL production stack for Chronicon
# ABOUTME: Full stack with PostgreSQL, API server, watch daemon, and nginx

# PostgreSQL production stack for Chronicon
# Usage:
#   1. cp .env.postgres.example .env && edit .env
#   2. docker compose -f docker-compose.postgres.yml up -d postgres
#   3. docker compose -f docker-compose.postgres.yml run --rm api \
#        python -m chronicon.cli archive --urls https://example.com --output-dir /archives
#   4. docker compose -f docker-compose.postgres.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: chronicon-postgres
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
      - /run/postgresql:noexec,nosuid,nodev,size=16m
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: chronicon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chronicon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronicon -d chronicon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chronicon.service=postgres"
      - "com.chronicon.stack=production"

  api:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile.api
    container_name: chronicon-api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    environment:
      DATABASE_URL: postgresql://chronicon:${POSTGRES_PASSWORD}@postgres:5432/chronicon
    volumes:
      - ./archives:/archives:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chronicon.service=api"
      - "com.chronicon.stack=production"

  watch:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile.api
    container_name: chronicon-watch
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
      - /home/chronicon:noexec,nosuid,nodev,size=8m
    environment:
      DATABASE_URL: postgresql://chronicon:${POSTGRES_PASSWORD}@postgres:5432/chronicon
      CHRONICON_OUTPUT_DIR: /archives
      # Export format control
      EXPORT_FORMATS: ${EXPORT_FORMATS:-html}
      # Git push credentials (optional)
      GIT_PUSH_ENABLED: ${GIT_PUSH_ENABLED:-false}
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_USERNAME: ${GIT_USERNAME:-}
      GIT_TOKEN: ${GIT_TOKEN:-}
    volumes:
      - ./archives:/archives
      - ./config/.chronicon.toml:/home/chronicon/.chronicon.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["watch", "--output-dir", "/archives"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chronicon.service=watch"
      - "com.chronicon.stack=production"

  nginx:
    image: nginx:1.27-alpine
    container_name: chronicon-nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /var/cache/nginx:noexec,nosuid,nodev,size=32m
      - /run:noexec,nosuid,nodev,size=8m
    ports:
      - "80:80"
      # Uncomment for SSL (see nginx.conf for SSL configuration)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./archives:/archives:ro
      # Uncomment for SSL certificates
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - external
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chronicon.service=nginx"
      - "com.chronicon.stack=production"

networks:
  internal:
    internal: true
  external:
